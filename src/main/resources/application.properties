spring.application.name=Grupo14SpringSoftCorporationBackend

# Cargar variables de entorno desde el archivo .env (solo en local).
# En Render NO existe .env: las variables se inyectan desde el dashboard.
# El prefijo "optional:" evita que la app falle al arrancar sin el archivo.
spring.config.import=optional:file:.env[.properties]

# ===== BASE DE DATOS =====
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
# En produccion conviene "validate" o "none". Configurable por entorno.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# ===== JWT =====
jwt.secret=${TOKEN_JWT_SECRET}
jwt.expiration=3600000
# Refresh token: 7 dias (en milisegundos)
jwt.refresh-expiration=604800000

# ===== SERVER =====
# Render asigna el puerto dinamicamente via la variable PORT.
# En local, si PORT no existe, usa 8080.
server.port=${PORT:8080}

# ===== HELPER DE DESARROLLO (/dev/hash) =====
# Endpoint publico para generar hashes BCrypt. Desactivado por defecto.
# Activalo SOLO temporalmente (en local o para crear el primer usuario).
app.dev-helper.enabled=${DEV_HELPER_ENABLED:false}

# ===== SWAGGER / OPENAPI =====
# Controlable por entorno. En produccion puedes ponerlo en false
# (variable SPRINGDOC_ENABLED=false en Render) para reducir superficie expuesta.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:true}
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.operationsSorter=method
