# ===== Configuracion exclusiva para pruebas (src/test) =====
# Estas propiedades sobreescriben a src/main/resources/application.properties
# cuando se ejecutan los tests, para no depender de variables de entorno (.env)
# ni de una base de datos PostgreSQL real.

# ===== BASE DE DATOS (H2 en memoria) =====
# @DataJpaTest reemplaza automaticamente esta configuracion por una embebida,
# pero la dejamos definida para que cualquier test @SpringBootTest tambien
# pueda levantar el contexto sin necesitar Postgres.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ===== JWT (valores de prueba, NO usar en produccion) =====
jwt.secret=claveSecretaDePruebaParaTestsConLongitudSuficiente
jwt.expiration=3600000
jwt.refresh-expiration=604800000
